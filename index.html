<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nidhu Birthday Terminal ❤️</title>
<style>
*,*::before,*::after{box-sizing:border-box;}
body{margin:0;font-family:"Courier New",monospace;background:#000;color:#00ff9f;overflow-x:hidden;overflow-y:auto;min-height:100vh;min-height:100dvh;}
body::before{content:"";position:fixed;inset:0;width:200%;height:200%;background:linear-gradient(45deg,#ff0080,#7928ca,#00ff9f);animation:moveBG 10s infinite alternate;z-index:-2;opacity:.18;}
@keyframes moveBG{0%{transform:translate(0,0)}100%{transform:translate(-25%,-25%)}}
#particleCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:-1;pointer-events:none;}
#graffiti{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.grf{position:absolute;font-family:"Courier New",monospace;font-weight:900;pointer-events:none;user-select:none;opacity:0;animation:grfPop 5s ease-in-out infinite;}
@keyframes grfPop{0%,100%{opacity:0;transform:scale(.8) rotate(var(--rot))}40%,60%{opacity:.13;transform:scale(1) rotate(var(--rot))}}
.terminal{position:relative;z-index:1;width:94%;max-width:820px;margin:16px auto 32px;padding:18px 16px 20px;background:rgba(0,0,0,.9);border-radius:14px;box-shadow:0 0 28px #00ff9f55;}
.titlebar{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.dots span{display:inline-block;width:10px;height:10px;border-radius:50%;}
.dots span:nth-child(1){background:#ff5f57}
.dots span:nth-child(2){background:#febc2e}
.dots span:nth-child(3){background:#28c840}
.title{font-size:clamp(13px,4vw,19px);color:#ff79c6;word-break:break-word;}
#text{min-height:70px;white-space:pre-line;font-size:clamp(13px,3.5vw,15px);line-height:1.75;}
.image-box{text-align:center;margin-top:16px;}
.image-box img{max-width:100%;max-height:clamp(190px,45vw,320px);width:auto;height:auto;object-fit:contain;border-radius:12px;border:2px solid #00ff9f;animation:imgGlow 3s ease-in-out infinite alternate;}
@keyframes imgGlow{from{box-shadow:0 0 8px #00ff9f88}to{box-shadow:0 0 24px #ff79c6cc}}
.btn-row{display:flex;align-items:center;justify-content:space-between;margin-top:18px;}
.nav-arrow{background:none;border:none;cursor:pointer;font-size:clamp(26px,8vw,38px);color:#00ff9f;padding:6px 10px;line-height:1;transition:color .2s,transform .15s,text-shadow .2s;-webkit-tap-highlight-color:transparent;user-select:none;}
.nav-arrow:hover{color:#ff79c6;text-shadow:0 0 14px #ff79c6cc;transform:scale(1.18);}
.nav-arrow:active{transform:scale(.92);}
.nav-arrow:disabled{opacity:.25;cursor:default;}
.counter{margin-top:10px;font-size:11px;color:#7928ca;text-align:right;letter-spacing:1px;}
.progress{height:3px;background:#111;border-radius:2px;margin-top:6px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#7928ca,#ff79c6);border-radius:2px;transition:width .5s ease;}
.slide-enter{animation:slideEnter .55s cubic-bezier(.22,1,.36,1) both;}
@keyframes slideEnter{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
/* ── Page wrapper for mobile centering ── */
.page-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;padding:12px 0 24px;}
/* ── Header ── */
.site-header{text-align:center;z-index:1;margin-bottom:10px;animation:headerPop .9s cubic-bezier(.22,1,.36,1) both;}
@keyframes headerPop{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
.site-header .tag{font-size:clamp(10px,2.8vw,13px);letter-spacing:3px;color:#7928ca;text-transform:uppercase;margin-bottom:4px;}
.site-header h1{margin:0;font-size:clamp(28px,9vw,58px);font-weight:900;font-family:"Courier New",monospace;background:linear-gradient(90deg,#ff79c6,#ff0080,#7928ca,#00ff9f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 14px #ff79c688);letter-spacing:2px;}
.site-header .sub{font-size:clamp(11px,3vw,14px);color:#ff79c688;margin-top:4px;letter-spacing:1px;}
/* ── Terminal no longer needs its own vertical margin on mobile ── */
.terminal{position:relative;z-index:1;width:94%;max-width:820px;margin:0 auto;padding:18px 16px 20px;background:rgba(0,0,0,.9);border-radius:14px;box-shadow:0 0 28px #00ff9f55;}
@media(min-width:640px){.terminal{width:82%;padding:26px 28px 28px;}.page-wrap{padding:20px 0 32px;}}
@media(min-width:960px){.page-wrap{padding:32px 0 40px;}}
/* ── Celebration overlay ── */
#celebOverlay{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.93);flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
#celebOverlay.show{display:flex;animation:celebFadeIn .6s ease both;}
@keyframes celebFadeIn{from{opacity:0}to{opacity:1}}
#celebCanvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.celeb-text{position:relative;z-index:2;}
.celeb-text .celeb-tag{font-size:clamp(11px,3vw,14px);letter-spacing:4px;color:#7928ca;text-transform:uppercase;margin-bottom:8px;}
.celeb-text h2{margin:0 0 12px;font-size:clamp(32px,11vw,72px);font-weight:900;font-family:"Courier New",monospace;background:linear-gradient(90deg,#ff79c6,#ffd700,#00ff9f,#ff0080);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 2s linear infinite;}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
.celeb-text .celeb-msg{font-size:clamp(14px,4vw,20px);color:#fff;line-height:1.8;margin-bottom:24px;white-space:pre-line;}
.celeb-text .celeb-sub{font-size:clamp(11px,3vw,13px);color:#ff79c688;letter-spacing:1px;margin-bottom:28px;}
.celeb-graffiti{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1;}
.cgrf{position:absolute;font-size:clamp(18px,5vw,38px);opacity:0;animation:cgrfFloat 4s ease-in-out infinite;}
@keyframes cgrfFloat{0%{opacity:0;transform:translateY(30px) scale(.7) rotate(var(--cr));}30%,70%{opacity:.55;transform:translateY(0) scale(1) rotate(var(--cr));}100%{opacity:0;transform:translateY(-30px) scale(.7) rotate(var(--cr));}}
#celebClose{background:linear-gradient(135deg,#ff0080,#7928ca);color:#fff;border:none;padding:13px 36px;font-size:clamp(14px,4vw,17px);font-family:"Courier New",monospace;font-weight:bold;border-radius:10px;cursor:pointer;box-shadow:0 0 20px #ff008066;transition:transform .15s,box-shadow .2s;-webkit-tap-highlight-color:transparent;}
#celebClose:hover{transform:scale(1.05);box-shadow:0 0 32px #ff0080aa;}
/* ── Intro Screen ── */
#introScreen{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#000;transition:opacity .9s cubic-bezier(.22,1,.36,1),transform .9s cubic-bezier(.22,1,.36,1);}
#introScreen.fade-out{opacity:0;transform:scale(1.04);pointer-events:none;}
#introCanvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
#introGraffiti{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1;}
.igrf{position:absolute;font-family:"Courier New",monospace;font-weight:900;pointer-events:none;user-select:none;opacity:0;animation:igrfFloat 5s ease-in-out infinite;}
@keyframes igrfFloat{0%,100%{opacity:0;transform:translateY(22px) scale(.8) rotate(var(--ir));}40%,60%{opacity:.22;transform:translateY(0) scale(1) rotate(var(--ir));}}
.intro-bg-glow{position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,#ff008022 0%,#7928ca11 50%,transparent 70%);animation:introGlowPulse 3s ease-in-out infinite;pointer-events:none;z-index:1;}
@keyframes introGlowPulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.25);opacity:1}}
.intro-content{position:relative;z-index:2;text-align:center;padding:24px 16px;}
.intro-tag{font-size:clamp(10px,3vw,13px);letter-spacing:4px;color:#7928ca;text-transform:uppercase;margin-bottom:14px;animation:introFadeUp 1s .3s both;}
.intro-name{font-size:clamp(52px,18vw,108px);font-weight:900;font-family:"Courier New",monospace;background:linear-gradient(90deg,#ff79c6,#ff0080,#7928ca,#00ff9f,#ffd700,#ff79c6);background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite,introFadeUp 1s .1s both;filter:drop-shadow(0 0 24px #ff79c677);line-height:1.1;margin:0 0 6px;}
.intro-heart{-webkit-text-fill-color:initial;font-size:.6em;vertical-align:middle;display:inline-block;animation:heartBeat 1.2s ease-in-out infinite;}
@keyframes heartBeat{0%,100%{transform:scale(1)}14%{transform:scale(1.3)}28%{transform:scale(1)}42%{transform:scale(1.18)}70%{transform:scale(1)}}
.intro-date{font-size:clamp(11px,3vw,15px);color:#ff79c677;letter-spacing:3px;margin-bottom:44px;animation:introFadeUp 1s .5s both;}
.intro-btn-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;margin-bottom:30px;animation:introFadeUp 1s .7s both;padding:50px;}
.intro-ring{position:absolute;inset:6px;border-radius:60px;border:1.5px solid #ff79c444;animation:introRingPulse 2.5s ease-in-out infinite;pointer-events:none;}
.intro-ring:nth-child(2){inset:-8px;animation-delay:.55s;border-color:#7928ca44;}
.intro-ring:nth-child(3){inset:-22px;animation-delay:1.1s;border-color:#ff008033;}
@keyframes introRingPulse{0%,100%{opacity:.9;transform:scale(1)}50%{opacity:.25;transform:scale(1.05)}}
#introBtn{position:relative;background:linear-gradient(135deg,#ff0080,#7928ca 50%,#ff79c6);color:#fff;border:none;padding:clamp(14px,4vw,19px) clamp(26px,7vw,52px);font-size:clamp(14px,4.2vw,20px);font-family:"Courier New",monospace;font-weight:bold;border-radius:50px;cursor:pointer;letter-spacing:.5px;box-shadow:0 0 36px #ff008077,0 0 70px #7928ca33;transition:transform .2s,box-shadow .2s;-webkit-tap-highlight-color:transparent;animation:introBtnPulse 2.5s ease-in-out infinite;white-space:nowrap;}
@keyframes introBtnPulse{0%,100%{box-shadow:0 0 36px #ff008077,0 0 70px #7928ca33;}50%{box-shadow:0 0 60px #ff0080cc,0 0 110px #7928ca88,0 0 160px #ff79c622;}}
#introBtn:hover{transform:scale(1.07);}
#introBtn:active{transform:scale(.94);}
.ibtn-icon{margin-right:10px;display:inline-block;animation:iconWiggle 1.8s ease-in-out infinite;}
@keyframes iconWiggle{0%,100%{transform:rotate(-10deg) scale(1)}50%{transform:rotate(10deg) scale(1.25)}}
.ibtn-arrow{margin-left:10px;display:inline-block;animation:arrowBounce 1s ease-in-out infinite;}
@keyframes arrowBounce{0%,100%{transform:translateX(0)}50%{transform:translateX(8px)}}
.intro-hint{font-size:clamp(9px,2.5vw,11px);color:#ffffff22;letter-spacing:3px;text-transform:uppercase;animation:introHintBlink 2s ease-in-out infinite,introFadeUp 1s 1.1s both;}
@keyframes introFadeUp{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
@keyframes introHintBlink{0%,100%{opacity:.22}50%{opacity:.55}}
</style>
</head>

<script>

];

const graffitiMap={
  matrix:["01001000","10110100","01010101","> BOOT","> LOVE","> HER","ERROR:404","01001"],
  petals:["🌸","🌺","🌷","🌹","✿","❀","🪷","𝑙𝑜𝑣𝑒","𝑠𝑡𝑎𝑟𝑡𝑠","here~"],
  stars:["★","✦","✧","☆","✩","⭐","✫","𝑒𝑦𝑒𝑠","gaze~","lost✦"],
  hearts:["♥","❤","💕","💗","♡","𝑠𝑚𝑖𝑙𝑒","magic♥","lips~"],
  pulsehearts:["💖","❤","💓","💗","♡","thump","𝑐𝑎𝑟𝑒𝑠","♥♥♥"],
  confetti:["🎊","🎉","★","confetti!","🎈","✦team✦","together","🎊"],
  bubbles:["○","◌","◦","°","∘","𝑝𝑒𝑎𝑐𝑒","calm~","safe♡"],
  balloons:["🎈","🎀","haha~","besties","😄","fun!","joy","bestie♡"],
  sparkles:["✨","✦","·˚","˚·","tiny✨","details","noticed~","𝑙𝑜𝑣𝑒"],
  rainbow:["🌈","red~","orange","yellow","𝑙𝑖𝑔ℎ𝑡","colors","life+","🌈"],
  fire:["🔥","flame~","burn","𝑙𝑜𝑣𝑒𝑠","🔥🔥","heat","spark","ignite"],

const PALETTES={
  matrix:["#00ff9f","#00cc7a","#00ff00","#39ff14"],
  petals:["#ff79c6","#ff85e1","#ffaad5","#ff4ecd","#ffc0cb"],
  stars:["#fffacd","#ffd700","#e0e0ff","#c8e6ff","#ffffff"],

  pulsehearts:["#ff0044","#ff4081","#e91e63","#ff79c6"],
  confetti:["#ff79c6","#00ff9f","#ffd700","#7928ca","#ff4500","#00bfff"],

  balloons:["#ff4444","#ffd700","#00ff9f","#ff79c6","#7928ca","#ff7043"],
  sparkles:["#ffffff","#ffd700","#fffacd","#e0e0ff","#c8f0ff"],
  rainbow:["#ff0000","#ff7f00","#ffff00","#00ff00","#0000ff","#8b00ff","#ff69b4"],
  fire:["#ff4500","#ff6600","#ff8c00","#ffd700","#ff2200"],
  orbit:["#ffffff","#c8e6ff","#ffd700","#b3e5fc","#7928ca"],
  fireworks:["#ff0080","#ffd700","#00ff9f","#ff4500","#7928ca","#00bfff"]
};
const CHARS={
  matrix:["0","1"],
  petals:["🌸","🌺","🌷","✿","❀"],
  stars:["★","✦","✧","✩","☆","⭐"],
  hearts:["♥","❤","♡","💗","💕"],

  rainbow:["●","◆","★","✦"],
  fire:["▲","△","◆","▾"],
  orbit:["★","✦","●","◉"],
  fireworks:["★","✦","●","◆","◉"]
};

const canvas=document.getElementById("particleCanvas");
const ctx=canvas.getContext("2d");
let particles=[],animFrame;

function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

class Particle{
  constructor(t){this.theme=t;this.reset(true);}
  reset(init){
    const W=canvas.width,H=canvas.height;
    this.x=Math.random()*W;
    this.y=init?Math.random()*H:(this.theme==="fire"?H+10:-20);
    this.sz=Math.random()*10+5;
    this.a=Math.random()*.6+.2;
    const pal=PALETTES[this.theme]||PALETTES.matrix;
    this.col=pal[Math.floor(Math.random()*pal.length)];
    const ch=CHARS[this.theme]||["●"];
    this.ch=ch[Math.floor(Math.random()*ch.length)];
    this.spd=Math.random()*1.6+.4;
    this.vx=(Math.random()-.5)*1.4;
    this.vy=this.theme==="fire"?-(Math.random()*2.2+.8):Math.random()*1.4+.4;
    this.rot=Math.random()*Math.PI*2;
    this.rsp=(Math.random()-.5)*.06;
    this.wob=Math.random()*Math.PI*2;
  }
  update(){
    this.wob+=.04;
    if(this.theme==="bubbles"||this.theme==="balloons"){this.x+=Math.sin(this.wob)*.9+this.vx*.3;this.y-=this.spd;}
    else if(this.theme==="fire"){this.x+=Math.sin(this.wob)*1.3+this.vx*.5;this.y+=this.vy;this.a-=.006;}
    else if(this.theme==="orbit"){this.rot+=this.rsp;this.x+=Math.cos(this.rot)*1.8;this.y+=Math.sin(this.rot)*.6+this.vy*.2;}
    else if(this.theme==="fireworks"){this.x+=this.vx*1.4;this.y+=this.vy*.6-.3;this.a-=.008;}
    else{this.x+=this.vx;this.y+=this.vy;}
    if(this.a<=0||this.y>canvas.height+20||this.y<-20||this.x<-20||this.x>canvas.width+20)this.reset(false);
  }
  draw(){
    ctx.save();ctx.globalAlpha=Math.max(0,this.a);ctx.fillStyle=this.col;
    ctx.font=`${this.sz*2}px Courier New`;ctx.translate(this.x,this.y);ctx.rotate(this.rot*.3);
    ctx.fillText(this.ch,0,0);ctx.restore();
  }
}

function initParticles(t){
  const n=window.innerWidth<600?30:55;
  particles=Array.from({length:n},()=>new Particle(t));
}
function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{p.update();p.draw();});
  animFrame=requestAnimationFrame(animateParticles);
}

const GCOLS=["#ff79c6","#00ff9f","#7928ca","#ffd700","#00bfff","#ff4500","#ff0080"];
function renderGraffiti(theme){
  const g=document.getElementById("graffiti");g.innerHTML="";
  const words=graffitiMap[theme]||[];
  words.forEach((w,i)=>{
    const el=document.createElement("span");el.className="grf";el.textContent=w;
    const sz=(Math.random()*36+20).toFixed(0);
    const rot=((Math.random()-.5)*50).toFixed(1);
    el.style.cssText=`font-size:${sz}px;top:${(Math.random()*88).toFixed(1)}%;left:${(Math.random()*88).toFixed(1)}%;color:${GCOLS[i%GCOLS.length]};--rot:${rot}deg;animation-delay:${(Math.random()*4).toFixed(2)}s;font-style:${Math.random()>.5?"italic":"normal"}`;
    g.appendChild(el);
  });
}

let current=0;
function typeWriter(text,el){
  el.innerHTML="";let i=0;
  (function type(){if(i<text.length){el.innerHTML+=text.charAt(i++);setTimeout(type,26);}})();
}
function updateButtons(){
  document.getElementById("btnPrev").disabled=current===0;
  document.getElementById("btnNext").innerHTML=current===slides.length-1?"&#10003;":"&#8594;";
}
function renderSlide(){
  const s=slides[current];
  document.getElementById("title").innerText=s.title;
  document.getElementById("image").src=s.img;
  document.getElementById("counter").textContent=`slide ${current+1} of ${slides.length}`;
  document.getElementById("progressFill").style.width=`${((current+1)/slides.length)*100}%`;
  const tb=document.getElementById("text");
  tb.classList.remove("slide-enter");void tb.offsetWidth;tb.classList.add("slide-enter");
  typeWriter(s.text,tb);
  updateButtons();
  cancelAnimationFrame(animFrame);
  initParticles(s.theme);
  animateParticles();
  renderGraffiti(s.theme);
}
function nextSlide(){if(current<slides.length-1){current++;renderSlide();}else{showCelebration();}}

/* ── Celebration overlay ── */
let celebAnimFrame;
function showCelebration(){
  const ov=document.getElementById("celebOverlay");
  ov.classList.add("show");
  buildCelebGraffiti();
  runCelebFireworks();
}
function closeCelebration(){
  document.getElementById("celebOverlay").classList.remove("show");
  cancelAnimationFrame(celebAnimFrame);
  current=0;renderSlide();
}
const CELEB_WORDS=["🎂","🎉","🎊","🥳","❤️","💖","✨","🌸","★","♥","NIDHU!","BDAY!","🎈","forever","love~","✦","🌈","🔥","💫","🎆"];
const CELEB_COLS=["#ff79c6","#ffd700","#00ff9f","#ff0080","#7928ca","#00bfff","#ff4500"];
function buildCelebGraffiti(){
  const g=document.getElementById("celebGraffiti");g.innerHTML="";
  for(let i=0;i<22;i++){
    const el=document.createElement("span");el.className="cgrf";
    el.textContent=CELEB_WORDS[i%CELEB_WORDS.length];
    const rot=((Math.random()-.5)*60).toFixed(1);
    el.style.cssText=`top:${(Math.random()*90).toFixed(1)}%;left:${(Math.random()*90).toFixed(1)}%;color:${CELEB_COLS[i%CELEB_COLS.length]};--cr:${rot}deg;animation-delay:${(Math.random()*3.5).toFixed(2)}s;animation-duration:${(Math.random()*2+3).toFixed(2)}s`;
    g.appendChild(el);
  }
}
function runCelebFireworks(){
  const c=document.getElementById("celebCanvas");
  c.width=window.innerWidth;c.height=window.innerHeight;
  const cx=c.getContext("2d");
  const fw=[];
  function spawnBurst(){
    const x=Math.random()*c.width,y=Math.random()*c.height*.6+60;
    const col=CELEB_COLS[Math.floor(Math.random()*CELEB_COLS.length)];
    for(let i=0;i<28;i++){
      const ang=Math.random()*Math.PI*2,spd=Math.random()*4+1.5;
      fw.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,a:1,col});
    }
  }
  let t=0;
  function loop(){
    cx.clearRect(0,0,c.width,c.height);
    if(t++%28===0)spawnBurst();
    for(let i=fw.length-1;i>=0;i--){
      const p=fw[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.06;p.a-=.018;
      if(p.a<=0){fw.splice(i,1);continue;}
      cx.save();cx.globalAlpha=p.a;cx.fillStyle=p.col;
      cx.beginPath();cx.arc(p.x,p.y,2.5,0,Math.PI*2);cx.fill();
      cx.restore();
    }
    celebAnimFrame=requestAnimationFrame(loop);
  }
  loop();
}
function prevSlide(){if(current>0){current--;renderSlide();}}

let touchStartX=0;
document.addEventListener("touchstart",e=>{touchStartX=e.changedTouches[0].screenX;},{passive:true});
document.addEventListener("touchend",e=>{const dx=e.changedTouches[0].screenX-touchStartX;if(Math.abs(dx)>50){dx<0?nextSlide():prevSlide();}},{passive:true});

/* ── Intro Screen Logic ── */
const INTRO_WORDS=["❤️","💖","🎂","✨","🌸","🎁","💝","★","♥","love","happy","🥳","forever","🎊","yours","24th","💫","🔥","🌹","✦","Nidhu","🎈","💕","bday~"];
const INTRO_COLS=["#ff79c6","#ff0080","#7928ca","#ffd700","#00ff9f","#ff4500","#00bfff","#ffffff"];
function buildIntroGraffiti(){
  const g=document.getElementById("introGraffiti");g.innerHTML="";
  for(let i=0;i<28;i++){
    const el=document.createElement("span");el.className="igrf";
    el.textContent=INTRO_WORDS[i%INTRO_WORDS.length];
    const sz=(Math.random()*30+12).toFixed(0);
    const rot=((Math.random()-.5)*64).toFixed(1);
    el.style.cssText=`font-size:${sz}px;top:${(Math.random()*92).toFixed(1)}%;left:${(Math.random()*90).toFixed(1)}%;color:${INTRO_COLS[i%INTRO_COLS.length]};--ir:${rot}deg;animation-delay:${(Math.random()*5).toFixed(2)}s;animation-duration:${(Math.random()*2+4).toFixed(2)}s;font-style:${Math.random()>.6?"italic":"normal"}`;
    g.appendChild(el);
  }
}
const iCanvas=document.getElementById("introCanvas");
const ictx=iCanvas.getContext("2d");
let iParticles=[],iAF;
function resizeICanvas(){iCanvas.width=window.innerWidth;iCanvas.height=window.innerHeight;}
resizeICanvas();
window.addEventListener("resize",resizeICanvas);
class IParticle{
  constructor(){this.reset(true);}
  reset(init){
    const W=iCanvas.width,H=iCanvas.height;
    this.x=Math.random()*W;this.y=init?Math.random()*H:H+12;
    this.sz=Math.random()*13+5;this.a=Math.random()*.45+.08;
    const pal=["#ff79c6","#ff0080","#ffd700","#7928ca","#ffffff","#00ff9f","#ff4ecd"];
    this.col=pal[Math.floor(Math.random()*pal.length)];
    const chs=["♥","❤","✦","✧","★","·","°","✨"];
    this.ch=chs[Math.floor(Math.random()*chs.length)];
    this.spd=Math.random()*.9+.3;this.vx=(Math.random()-.5)*.9;
    this.wob=Math.random()*Math.PI*2;
  }
  update(){this.wob+=.03;this.x+=Math.sin(this.wob)*.8+this.vx*.2;this.y-=this.spd;if(this.y<-20)this.reset(false);}
  draw(){ictx.save();ictx.globalAlpha=Math.max(0,this.a);ictx.fillStyle=this.col;ictx.font=`${this.sz*2}px Courier New`;ictx.fillText(this.ch,this.x,this.y);ictx.restore();}
}
function initIParticles(){const n=window.innerWidth<600?22:44;iParticles=Array.from({length:n},()=>new IParticle());}
function animateIntro(){ictx.clearRect(0,0,iCanvas.width,iCanvas.height);iParticles.forEach(p=>{p.update();p.draw();});iAF=requestAnimationFrame(animateIntro);}
function startSurprise(){
  const intro=document.getElementById("introScreen");
  intro.classList.add("fade-out");
  document.getElementById("bgMusic").play().catch(()=>{});
  setTimeout(()=>{intro.style.display="none";cancelAnimationFrame(iAF);renderSlide();},960);
}
buildIntroGraffiti();initIParticles();animateIntro();
</script>
